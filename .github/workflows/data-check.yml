name: data-in-sync

# Verifies the committed scripts/data.js is exactly what build/extract.py produces
# from data.xlsx — so the published figures can never silently drift from the
# source model. Runs on every push/PR, plus a weekly heartbeat.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 12 * * 1" # Mondays 12:00 UTC
  workflow_dispatch:

jobs:
  data-in-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r build/requirements.txt
      - name: Regenerate data.js from data.xlsx
        run: python3 build/extract.py
      - name: Fail if data.js drifted from the source workbook
        run: |
          if ! git diff --quiet scripts/data.js; then
            echo "::error::scripts/data.js is out of sync with data.xlsx — run 'python3 build/extract.py' and commit."
            git --no-pager diff --stat scripts/data.js
            exit 1
          fi
          echo "✓ data.js matches data.xlsx"
